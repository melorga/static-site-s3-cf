name: Deploy Static Site Infrastructure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.15.1'
  AWS_REGION: 'us-east-1'

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive .

      # The module declares `configuration_aliases = [aws.us_east_1]`, which
      # means it cannot be `terraform validate`-ed standalone — the aliased
      # provider must be passed in by a caller. We validate via the example,
      # which configures both the default and us_east_1 providers and passes
      # them into the module. This exercises the module's full surface.
      - name: Terraform Init (Example)
        run: terraform init -backend=false
        working-directory: ./examples/basic

      - name: Terraform Validate (Example)
        run: terraform validate
        working-directory: ./examples/basic

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: terraform-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [terraform-validate, security-scan]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./examples/basic

      - name: Terraform Plan
        run: terraform plan -no-color
        working-directory: ./examples/basic

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-validate, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    outputs:
      website_url: ${{ steps.tf_outputs.outputs.website_url }}
      bucket_name: ${{ steps.tf_outputs.outputs.bucket_name }}
      distribution_id: ${{ steps.tf_outputs.outputs.distribution_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./examples/basic

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./examples/basic

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: ./examples/basic
        run: |
          {
            echo "website_url=$(terraform output -raw website_url)"
            echo "bucket_name=$(terraform output -raw s3_bucket_name)"
            echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)"
          } >> "$GITHUB_OUTPUT"

      - name: Sync website to S3
        run: |
          aws s3 sync examples/basic/website "s3://${{ steps.tf_outputs.outputs.bucket_name }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf_outputs.outputs.distribution_id }}" \
            --paths '/*'

  lighthouse-audit:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait for CloudFront invalidation to settle
        run: sleep 60

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.terraform-apply.outputs.website_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
